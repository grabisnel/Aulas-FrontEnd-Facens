<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Cadastro</title>
    <style>
        body{
            font-family: Georgia, 'Times New Roman', Times, serif;
            background: #94BBE9;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        p {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }
    .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background:#fcfcfc;
        border-radius: 8px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    .campos {
        display:grid;
        grid-template-columns: 1fr;
        padding: 3%;
        gap: 8px;
        input:focus {
            border-color: #000000;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }
    }
    .genero, .estados, .interesses, .documento{
        margin-top: 20px;
    }

    .comentarios {
        margin-top: 22px;
    }



    .enviar button {
        display: grid;
        margin-left: 200px;
        position:relative;
        top: 26px;
    }
    .limpar button {
        display: grid;
        position: relative;
        top: 6px;
        margin-left: 290px;
    }

    </style>
</head>

<body>
    
    <header>
        <h1>Preencha os campos abaixo</h1>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Aut illo facilis hic totam vitae consequatur atque
            quisquam provident minima tempora natus, suscipit quae, numquam, quasi repellat possimus voluptate! Dolores,
            quasi!</p>
        <div class="container" id="container">    
        <form>
            <div class="campos">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">
            
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email">
           
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
            
                <label for="date">Data de Nascimento</label>
                <input type="date" id="date" name="date" placeholder="Digite sua data de nascimento">
            </div>
            <div class="genero">
                <label for="Genero">Genero</label>
                <select id="genero" name="genero">
                    <option value="">Selecione seu genero</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="outro">Outro</option>
                </select>
            </div>
            <div class="estados">
                <label for ="estados">Estado Civil:</label>
                <input type="radio" id="solteiro" name="estados" value="solteiro">
                <label for="solteiro">Solteiro</label>
                <input type="radio" id="casado" name="estados" value="casado">
                <label for="casado">Casado</label>
                <input type="radio" id="divorciado" name="estados" value="divorciado">
                <label for="divorciado">Divorciado</label>
                <input type="radio" id="viuvo" name="estados" value="viuvo">
                <label for="viuvo">Viúvo</label>
            </div>

            <div class="interesses">
                <label for="interesses">Interesses: </label>
                <input type="checkbox" id="tecnologia" name="interesses" value="tecnologia">
                <label for="tecnologia">Tecnologia</label>
                <input type="checkbox" id="esportes" name="interesses" value="esportes">
                <label for="esportes">Esportes</label>
                <input type="checkbox" id="musica" name="interesses" value="musica">
                <label for="musica">Música</label>
                <input type="checkbox" id="viagens" name="interesses" value="viagens">
                <label for="viagens">Viagens</label>
                <input type="checkbox" id="culinaria" name="interesses" value="culinaria">
                <label for="culinaria">Culinária</label>
                <input type="checkbox" id="video games" name="interesses" value="video games">
                <label for="video games">Video Games</label>
            </div>
            <div class="documento">
                <label for="envio de documento">Envio de Documento:</label>
                <input type="file" id="envio de documento" name="envio de documento">
            </div>
            <div class="comentarios">
                <label for="comentarios">Comentarios:</label>
                <textarea id="comentarios" name="comentarios" placeholder="Digite seus comentarios aqui..."></textarea>

            <div class="enviar">
                <button type="submit">Enviar</button>
            </div>
            <div class="limpar">
                <button type="reset">Limpar</button>
            </div>
            </div>
        </form>
    </header>


</body>

</html>
